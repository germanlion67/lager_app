# docker-compose.prod.yml
#
# Produktions-Setup mit Runtime-Konfiguration:
#   - Nginx Proxy Manager übernimmt SSL, Sicherheits-Header und Routing
#   - PocketBase und Flutter Web sind NICHT direkt von außen erreichbar
#   - Ports nur intern im Docker-Netzwerk
#   - POCKETBASE_URL wird zur Laufzeit konfiguriert (kein Rebuild nötig!)
#
# Architektur-Übersicht (Netzwerk-Sicherheit):
# Internet
#     │
#     ▼
# Nginx Proxy Manager :80/:443  (SSL, Header, Routing) ← Einziger öffentlicher Port
#     │
#     ├──→ lager_frontend :8081  (Caddy, Flutter Web) ← Nur intern erreichbar (expose)
#     │
#     └──→ pocketbase :8080      (PocketBase API + Admin UI) ← Nur intern erreichbar (expose)
#
# Sicherheits-Konzept:
#   ✅ Nur Nginx Proxy Manager hat öffentliche Ports (:80, :443)
#   ✅ PocketBase & App nutzen nur 'expose' → NICHT direkt von außen erreichbar
#   ✅ Alle Services im privaten Docker-Netzwerk 'lager_network'
#   ✅ Healthchecks überwachen Service-Status (automatischer Neustart bei Problemen)
#   ✅ Service-Dependencies: App wartet auf PocketBase, Nginx wartet auf beide
#
# Starten (mit Runtime-Config):
#   docker compose -f docker-compose.prod.yml --env-file .env.production up -d
#
# URL ändern (kein Rebuild):
#   1. .env.production bearbeiten
#   2. docker compose -f docker-compose.prod.yml restart app
#
# Oder mit Umgebungsvariablen:
#   POCKETBASE_URL=https://api.deine-domain.de \
#   docker compose -f docker-compose.prod.yml up -d

services:

  # ============================================================
  # Nginx Proxy Manager
  # Übernimmt: SSL/HTTPS, Sicherheits-Header, Reverse Proxy
  # 
  # SICHERHEIT (H-007):
  #   ✅ EINZIGER Service mit öffentlichen Ports
  #   ✅ Admin UI (Port 81) NUR auf localhost gebunden (127.0.0.1:81)
  #   ✅ Alle anderen Services nur intern erreichbar
  #   ✅ Fungiert als einzige Schnittstelle zum Internet
  #
  # HEALTHCHECK (H-006):
  #   - Prüft Admin-API alle 30 Sekunden
  #   - 20 Sekunden Startzeit (Let's Encrypt-Initialisierung)
  #   - 3 Wiederholungen bei Fehlschlag
  #   - Automatischer Neustart bei Problemen durch Docker
  # ============================================================
  nginx-proxy-manager:
    image: jc21/nginx-proxy-manager:latest
    container_name: nginx_proxy_manager
    restart: unless-stopped
    ports:
      # ⚠️ ÖFFENTLICH: HTTP/HTTPS für Web-Traffic
      - "80:80"
      - "443:443"
      # ✅ SICHER: Admin UI NUR auf localhost (127.0.0.1) gebunden
      # → NICHT von außen erreichbar, nur vom Server selbst
      - "127.0.0.1:81:81"
    volumes:
      - ./server/npm/data:/data
      - ./server/npm/letsencrypt:/etc/letsencrypt
    # H-006: Healthcheck für Nginx Proxy Manager
    # Prüft ob Admin-API erreichbar ist
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:81/api/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    # Wartet bis Backend-Services bereit sind
    depends_on:
      pocketbase:
        condition: service_healthy
      app:
        condition: service_healthy
    networks:
      - lager_network

  # ============================================================
  # PocketBase Backend with Auto-Initialization
  # 
  # SICHERHEIT (H-007):
  #   ✅ KEIN 'ports:' Mapping → NICHT direkt von außen erreichbar
  #   ✅ Nur 'expose:' → Erreichbar nur für andere Docker-Services
  #   ✅ Nur über Nginx Proxy Manager (Reverse Proxy) zugänglich
  #   ✅ Minimale Angriffsfläche durch Netzwerk-Isolation
  # 
  # HEALTHCHECK (H-006):
  #   - Prüft /api/health alle 10 Sekunden
  #   - 15 Sekunden Startzeit (Auto-Initialisierung braucht Zeit)
  #   - 5 Wiederholungen bei Fehlschlag
  #   - Bei anhaltendem Fehler: Automatischer Container-Neustart
  #
  # Features:
  # - Automatische Admin-User-Erstellung beim ersten Start
  # - Automatische Migration-Anwendung
  # - Konfiguration über Umgebungsvariablen
  # ============================================================
  pocketbase:
    # H-005: Verwende vorgebautes Image statt lokalem Build
    image: ghcr.io/germanlion67/lager_app_pocketbase:latest
    container_name: pocketbase
    restart: unless-stopped
    # ✅ H-007: expose statt ports → NUR intern erreichbar
    # Port 8080 ist NICHT von außen erreichbar, nur für Docker-Services
    expose:
      - "8080"
    environment:
      # Admin-Zugangsdaten (WICHTIG: In Produktion ändern!)
      - PB_ADMIN_EMAIL=${PB_ADMIN_EMAIL:-admin@example.com}
      - PB_ADMIN_PASSWORD=${PB_ADMIN_PASSWORD:-changeme123}
      - PB_DATA_DIR=/pb_data
      - PB_MIGRATIONS_DIR=/pb_migrations
      - PB_FORCE_SUPERUSER_UPSERT=${PB_FORCE_SUPERUSER_UPSERT:-0}
      - PB_DEV_MODE=${PB_DEV_MODE:-0}
      # CORS-Konfiguration (WICHTIG: In Produktion spezifische Domain(s) angeben!)
      # Komma-getrennte Liste erlaubter Origins, z.B.:
      #   - Einzelne Domain: https://app.your-domain.com
      #   - Multiple Domains: https://app.your-domain.com,https://admin.your-domain.com
      # WICHTIG: Keine Leerzeichen in der Liste!
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:?CORS_ALLOWED_ORIGINS muss in Produktion gesetzt sein!}
    volumes:
      - ./server/pb_data:/pb_data
      - ./server/pb_public:/pb_public
      - ./server/pb_migrations:/pb_migrations:ro
      # Tägliches Backup-Verzeichnis
      - ./server/pb_backups:/pb_backups
    # H-006: Healthcheck für PocketBase
    # Prüft ob API erreichbar ist via /api/health Endpoint
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - lager_network

  # ============================================================
  # Flutter Web Frontend (Caddy) with Runtime Configuration
  # 
  # SICHERHEIT (H-007):
  #   ✅ KEIN 'ports:' Mapping → NICHT direkt von außen erreichbar
  #   ✅ Nur 'expose:' → Erreichbar nur für andere Docker-Services
  #   ✅ Nur über Nginx Proxy Manager (Reverse Proxy) zugänglich
  #   ✅ Security Headers in Caddyfile konfiguriert (CSP, X-Frame-Options, etc.)
  #
  # HEALTHCHECK (H-006):
  #   - Prüft Root-Pfad (/) alle 30 Sekunden
  #   - 5 Sekunden Startzeit (Caddy startet schnell)
  #   - 3 Wiederholungen bei Fehlschlag
  #   - Bei anhaltendem Fehler: Automatischer Container-Neustart
  #
  # Runtime-Config: URL-Änderung ohne Rebuild möglich
  # ============================================================
  app:
    # H-005: Verwende vorgebautes Image statt lokalem Build
    # Runtime-Config: URL wird beim Container-Start dynamisch gesetzt
    image: ghcr.io/germanlion67/lager_app_web:latest
    container_name: lager_frontend
    restart: unless-stopped
    environment:
      # Runtime-Konfiguration: Wird beim Container-Start in config.js geschrieben
      # URL-Änderung: .env bearbeiten + docker compose restart app
      - POCKETBASE_URL=${POCKETBASE_URL:?POCKETBASE_URL muss gesetzt sein!}
    # ✅ H-007: expose statt ports → NUR intern erreichbar
    # Port 8081 ist NICHT von außen erreichbar, nur für Docker-Services
    expose:
      - "8081"
    depends_on:
      pocketbase:
        condition: service_healthy
    # H-006: Healthcheck für Flutter Web / Caddy
    # Prüft ob Webserver antwortet
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8081/"]
      interval: 30s
      timeout: 3s
      start_period: 5s
      retries: 3
    networks:
      - lager_network

networks:
  lager_network:
    driver: bridge

volumes:
  pb_data:
  pb_backups: