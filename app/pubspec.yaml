name: lager_app
description: Eine App zur Verwaltung von Elektronik- und Bastelartikeln

publish_to: none

version: 0.9.4+39

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # ==================== CORE ====================

  pocketbase: ^0.23.2
  uuid: ^4.5.1
  # GEÄNDERT: js: ^0.7.1 entfernt — deprecated (discontinued im outdated-Report).
  # runtime_env_config nutzt bereits web: ^1.1.0 + dart:js_interop.
  # Prüfen: grep -r "package:js" lib/ → falls Treffer, erst migrieren.

  sqflite: ^2.3.0
  sqflite_common_ffi: ^2.3.6

  shared_preferences: ^2.5.5
  flutter_secure_storage: ^10.0.0

  # ==================== UI & NAVIGATION ====================

  provider: ^6.0.3
  intl: ^0.20.2
  url_launcher: ^6.3.1
  cached_network_image: ^3.2.3
  cupertino_icons: ^1.0.9

  # ==================== BILDER & KAMERA ====================

  image_picker: ^1.2.0
  image: ^4.2.0
  crop_your_image: ^2.0.0

  # ==================== DATEIEN ====================

  file_selector: ^1.0.4
  file_selector_platform_interface: ^2.7.0
  # GEÄNDERT: ^10.1.0 → ^11.0.2 (Major, Resolvable = Latest)
  # Breaking Change: FilePickerResult-API prüfen (siehe Schritt C.3)
  file_picker: ^11.0.2
  path_provider: ^2.0.11
  path: ^1.9.0
  mime: ^2.0.0
  # GEÄNDERT: ^10.1.2 → ^12.0.2 (Resolvable, nicht Latest 13.x wegen Platform-Interface-Konflikt)
  # Breaking Change: ShareResult-API prüfen (siehe Schritt C.4)
  share_plus: ^12.0.2
  web: ^1.1.0
  open_file: ^3.2.1

  # ==================== SCANNER (nur Mobile) ====================

  mobile_scanner: ^7.0.1

  # ==================== EXPORT / IMPORT ====================

  pdf: ^3.8.1
  printing: ^5.9.0
  # GEÄNDERT: ^6.0.0 → ^8.0.0 (Major, Resolvable = Latest)
  # Breaking Change: CsvToListConverter / ListToCsvConverter API prüfen (siehe Schritt C.2)
  csv: ^8.0.0
  archive: ^4.0.7
  xml: ^6.6.1

  # ==================== NETZWERK & SYNC ====================

  http: ^1.2.2
  connectivity_plus: ^7.1.1
  webdav_client: ^1.0.0
  crypto: ^3.0.3

  # ==================== SYSTEM ====================

  # GEÄNDERT: ^10.1.2 → ^12.4.0 (Resolvable, nicht Latest 13.x wegen Platform-Interface-Konflikt)
  # Breaking Change: DeviceInfoPlugin-API prüfen (siehe Schritt C.5)
  device_info_plus: ^12.4.0

  runtime_env_config:
    path: ../packages/runtime_env_config

  # GEÄNDERT: ^19.4.1 → ^21.0.0 (Major — HÖCHSTES RISIKO, siehe Schritt C.1)
  # Breaking Changes: Initialisierung, Android-Manifest, Notification-Details
  flutter_local_notifications: ^21.0.0

  logger: ">=2.7.0 <3.0.0"
  google_fonts: ^8.0.2
  # GEÄNDERT: ^9.0.0 → ^9.0.1 (Patch, bereits durch pub upgrade erfasst)
  package_info_plus: ^9.0.1
  local_auth: ^3.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  mockito: ^5.6.4
  # GEÄNDERT: ^2.4.6 → ^2.14.0 (Minor, innerhalb ^ aber explizit setzen)
  build_runner: ^2.14.0
  flutter_native_splash: ^2.3.10

flutter:
  uses-material-design: true
  assets:
    - assets/images/

flutter_launcher_icons:
  image_path: assets/images/app_logo.png
  android: true
  ios: true
  windows:
    generate: true
    icon_size: 256
  web:
    generate: true
    image_path: assets/images/app_logo.png
    background_color: "#1976d2"
    theme_color: "#1976d2"

dependency_overrides:
  # ENTFERNT: connectivity_plus_platform_interface Override war bereits
  # auskommentiert und ist mit connectivity_plus ^7.x nicht mehr nötig.

flutter_native_splash:
  color: "#1976d2"
  image: assets/images/app_logo.png
  color_dark: "#121212"
  image_dark: assets/images/app_logo.png
  android: true
  ios: true
  web: true
  android_12:
    color: "#1976d2"
    image: assets/images/app_logo.png
    icon_background_color: "#1976d2"
    color_dark: "#121212"
    image_dark: assets/images/app_logo.png
    icon_background_color_dark: "#121212"