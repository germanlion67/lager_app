# pubspec.yaml

name: elektronik_verwaltung
description: Eine App zur Verwaltung von Elektronik- und Bastelartikeln
version: 1.6.0

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # ==================== CORE ====================
  # PocketBase (Backend API + Datenbank + File Storage)
  pocketbase: ^0.23.2

  # Lokale SQLite DB (nur Mobile/Desktop)
  sqflite: ^2.0.0+4
  sqflite_common_ffi: ^2.3.6

  # Einstellungen & Konfiguration
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.2.2

  # ==================== UI & NAVIGATION ====================
  provider: ^6.0.3
  intl: ^0.20.2
  url_launcher: ^6.3.1
  cached_network_image: ^3.2.3

  # ==================== BILDER & KAMERA ====================
  image_picker: ^1.2.0
  image_picker_for_web: ^3.1.0
  image: ^4.2.0
  crop_your_image: ^2.0.0
 
  # ==================== DATEIEN ====================
  file_picker: ^10.1.0
  path_provider: ^2.0.11
  path: ^1.9.0
  mime: ^2.0.0
  share_plus: ^10.1.2
  open_file: ^3.2.1           # Dokumente öffnen (nur Mobile/Desktop)

  # ==================== SCANNER (nur Mobile) ====================
  mobile_scanner: ^7.0.1

  # ==================== EXPORT / IMPORT ====================
  pdf: ^3.8.1
  printing: ^5.9.0
  csv: ^6.0.0
  archive: ^4.0.7
  xml: ^6.6.1

  # ==================== NETZWERK & SYNC ====================
  http: ^1.2.2
  connectivity_plus: ^5.0.2   # WLAN-Check (nur Mobile)
  webdav_client: ^1.0.0       # Nextcloud WebDAV (nur Mobile, ZIP-Backup)

  # ==================== SYSTEM ====================
  device_info_plus: ^10.1.0
  flutter_local_notifications: ^19.4.1  # Nur Mobile
  logger: ^2.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  mockito: ^5.4.2
  mocktail: ^1.0.4
  build_runner: ^2.4.6
  path_provider_platform_interface: ^2.1.2
  file_selector: ^1.0.4
  file_selector_platform_interface: any
  flutter_native_splash: ^2.3.10
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/

flutter_native_splash:
  color: "#1976d2"
  image: assets/images/app_logo.png
  android: true
  ios: true
  web: false

flutter_launcher_icons:
  image_path: assets/images/app_logo.png
  android: true
  ios: true
  windows:
    generate: true
    icon_size: 256
