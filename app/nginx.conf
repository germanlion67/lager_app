# nginx.conf

server {
    listen 80;
    server_name localhost;

    # Flutter Web App
    root /usr/share/nginx/html;
    index index.html;

    # ============================================================
    # Flutter Web SPA Routing
    # Alle unbekannten Pfade → index.html (Flutter Router)
    # ============================================================
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ============================================================
    # PocketBase API Reverse Proxy
    # /api/* → http://server:8080/api/*
    # ============================================================
    location /api/ {
        proxy_pass http://server:8080/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeout für langsame Requests (z.B. große Uploads)
        proxy_connect_timeout 60s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;

        # Große Datei-Uploads erlauben (Bilder)
        client_max_body_size 20M;
    }

    # ============================================================
    # PocketBase Admin UI
    # /_/* → http://server:8080/_/*
    # ============================================================
    location /_/ {
        proxy_pass http://server:8080/_/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ============================================================
    # PocketBase Datei-Downloads (Bilder etc.)
    # /api/files/* wird schon durch /api/ abgedeckt,
    # aber wir setzen explizit Caching für Bilder
    # ============================================================
    location /api/files/ {
        proxy_pass http://server:8080/api/files/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;

        # Bilder cachen (1 Stunde)
        proxy_cache_valid 200 1h;
        expires 1h;
        add_header Cache-Control "public, max-age=3600";
    }

    # ============================================================
    # Gzip Kompression
    # ============================================================
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript
               application/wasm;
    gzip_min_length 1000;

    # ============================================================
    # Sicherheits-Header
    # ============================================================
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
}
