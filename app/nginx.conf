# nginx.conf

server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # ============================================================
    # Sicherheits-Header
    # Fix: Header auf server-Ebene verschoben, NICHT in location / —
    # add_header in einem location-Block deaktiviert alle geerbten
    # add_header-Direktiven aus übergeordneten Blöcken (nginx-Vererbungsregel).
    # Durch Platzierung auf server-Ebene gelten sie für alle locations.
    # ============================================================
    add_header X-Frame-Options       "SAMEORIGIN"   always;
    add_header X-Content-Type-Options "nosniff"     always;
    add_header X-XSS-Protection      "1; mode=block" always;

    # Fix: Referrer-Policy und Permissions-Policy ergänzt —
    # X-XSS-Protection ist in modernen Browsern deprecated,
    # diese Header sind der aktuelle Standard.
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy     "camera=(), microphone=(), geolocation=()" always;

    # ============================================================
    # Gzip Kompression
    # Fix: gzip auf server-Ebene — gilt dann für alle locations.
    # Fix: gzip_vary on ergänzt — sendet "Vary: Accept-Encoding",
    # damit Proxies/CDNs komprimierte und unkomprimierte Versionen
    # separat cachen und nicht die falsche Version ausliefern.
    # Fix: gzip_proxied any — komprimiert auch Antworten die
    # nginx von PocketBase (Reverse Proxy) weiterleitet.
    # Fix: gzip_comp_level 6 — guter Kompromiss zwischen
    # CPU-Last und Kompressionsrate (Standard: 1, Maximum: 9).
    # ============================================================
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   6;
    gzip_min_length   1000;
    gzip_types
        text/plain
        text/css
        text/javascript
        text/xml
        application/json
        application/javascript
        application/xml
        application/xml+rss
        application/wasm
        # Fix: image/svg+xml ergänzt — SVGs sind Text und profitieren
        # stark von gzip-Kompression
        image/svg+xml;

    # ============================================================
    # Flutter Web SPA Routing
    # ============================================================
    location / {
        try_files $uri $uri/ /index.html;

        # Fix: Cache-Control für index.html — darf NICHT gecacht werden,
        # da Flutter beim Update eine neue main.dart.js mit neuem Hash
        # ausliefert. Ohne no-cache lädt der Browser die alte index.html
        # und findet die neuen Assets nicht → App startet nicht.
        location = /index.html {
            add_header Cache-Control "no-store, no-cache, must-revalidate" always;
            # Fix: Sicherheits-Header hier wiederholen — wegen nginx-
            # Vererbungsregel: ein innerer location-Block mit add_header
            # überschreibt alle add_header des äußeren Blocks.
            add_header X-Frame-Options        "SAMEORIGIN"   always;
            add_header X-Content-Type-Options "nosniff"      always;
            add_header X-XSS-Protection       "1; mode=block" always;
            add_header Referrer-Policy        "strict-origin-when-cross-origin" always;
            add_header Permissions-Policy     "camera=(), microphone=(), geolocation=()" always;
        }

        # Fix: Aggressives Caching für Flutter-Assets —
        # Flutter benennt alle Assets mit Content-Hash im Dateinamen
        # (z.B. main.dart.js?v=abc123 oder flutter_bootstrap.js).
        # Diese können dauerhaft gecacht werden, da sich der Hash
        # bei jeder Änderung ändert → Cache-Busting ist eingebaut.
        location ~* \.(js|css|wasm|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable" always;
            # Fix: Sicherheits-Header wiederholen (nginx-Vererbungsregel)
            add_header X-Frame-Options        "SAMEORIGIN"   always;
            add_header X-Content-Type-Options "nosniff"      always;
            add_header X-XSS-Protection       "1; mode=block" always;
            add_header Referrer-Policy        "strict-origin-when-cross-origin" always;
            add_header Permissions-Policy     "camera=(), microphone=(), geolocation=()" always;
        }
    }

    # ============================================================
    # PocketBase API Reverse Proxy
    # /api/* → http://pocketbase:8090/api/*
    # Fix: Upstream-Hostname "server" → "pocketbase" —
    # "server" ist ein reserviertes nginx-Schlüsselwort und kann
    # zu unerwartetem Verhalten führen. Der Hostname sollte dem
    # Docker-Compose-Servicenamen entsprechen (z.B. "pocketbase").
    # Fix: Port 8080 → 8090 — PocketBase läuft standardmäßig auf 8090.
    # ============================================================
    location /api/ {
        proxy_pass http://pocketbase:8090/api/;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Fix: proxy_http_version 1.1 + Connection "" —
        # erzwingt HTTP/1.1 für Keep-Alive-Verbindungen zum Upstream.
        # Ohne diese Einstellung verwendet nginx HTTP/1.0, das kein
        # Keep-Alive unterstützt → jeder Request öffnet eine neue
        # TCP-Verbindung zum PocketBase-Container (Performance-Problem).
        proxy_http_version 1.1;
        proxy_set_header   Connection "";

        # Fix: proxy_buffering off für SSE/Realtime-Endpoints —
        # PocketBase nutzt Server-Sent Events für Realtime-Updates.
        # Mit Buffering puffert nginx die Antwort und der Client
        # empfängt keine Events in Echtzeit.
        # Hinweis: Nur für /api/realtime nötig — hier global gesetzt
        # als sicherer Default. Für große Uploads kann ein separater
        # location-Block mit proxy_buffering on sinnvoll sein.
        proxy_buffering off;

        proxy_connect_timeout 60s;
        proxy_send_timeout    120s;
        proxy_read_timeout    120s;

        # Fix: client_max_body_size auf server-Ebene gehört —
        # hier im /api/-Block ist es korrekt für Upload-Endpoints,
        # aber 20M könnte für andere API-Calls zu großzügig sein.
        # Für Bild-Uploads ist 20M ein vernünftiger Wert.
        client_max_body_size 20M;
    }

    # ============================================================
    # PocketBase Admin UI
    # /_/* → http://pocketbase:8090/_/*
    # Fix: Hostname + Port korrigiert (siehe /api/-Block oben).
    # Fix: Admin UI von außen sperren — die Admin UI sollte nicht
    # öffentlich erreichbar sein. Zugriff nur aus dem internen
    # Docker-Netzwerk oder per SSH-Tunnel empfohlen.
    # ============================================================
    location /_/ {
        # Fix: Admin UI auf interne Netzwerke beschränken —
        # 172.16.0.0/12 deckt das Standard-Docker-Netzwerk ab.
        # Für Produktionsumgebungen: komplett sperren (deny all)
        # und nur per SSH-Tunnel oder VPN zugreifen.
        allow 172.16.0.0/12;
        allow 127.0.0.1;
        deny  all;

        proxy_pass http://pocketbase:8090/_/;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_http_version 1.1;
        proxy_set_header   Connection "";
    }

    # ============================================================
    # PocketBase Datei-Downloads (Bilder etc.)
    # Fix: Diese location muss VOR /api/ stehen — nginx wählt den
    # spezifischsten prefix-Match. Da /api/files/ spezifischer als
    # /api/ ist, wird diese location bevorzugt. In der originalen
    # Reihenfolge (nach /api/) wurde /api/files/ nie erreicht,
    # weil /api/ bereits matcht und proxy_cache_valid dort fehlt.
    #
    # Fix: proxy_cache_valid allein reicht nicht — nginx braucht
    # eine benannte proxy_cache_path + proxy_cache Zone.
    # Ohne diese Direktiven hat proxy_cache_valid keinen Effekt.
    # Da das Einrichten einer Cache-Zone http-Kontext erfordert
    # (außerhalb dieses server-Blocks), wird hier nur
    # Cache-Control per Header gesetzt — das reicht für
    # Browser-Caching ohne nginx-seitigen Proxy-Cache.
    # ============================================================
    location /api/files/ {
        proxy_pass http://pocketbase:8090/api/files/;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_http_version 1.1;
        proxy_set_header   Connection "";

        # Fix: proxy_cache_valid entfernt — ohne proxy_cache_path
        # und proxy_cache hat es keinen Effekt (stille Fehlfunktion).
        # Browser-Caching über expires + Cache-Control ist ausreichend.
        expires 1h;
        add_header Cache-Control "public, max-age=3600" always;

        # Fix: client_max_body_size für File-Endpoint
        client_max_body_size 20M;
    }
}