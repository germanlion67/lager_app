# analysis_options.yaml
#
# Konfiguriert den Dart Analyzer — statische Codeanalyse für
# Fehler, Warnungen und Lints.
#
# Dokumentation: https://dart.dev/tools/analysis
# Alle verfügbaren Lints: https://dart.dev/lints

include: package:flutter_lints/flutter.yaml

analyzer:
  language:
    strict-casts: true
    strict-inference: true
    strict-raw-types: true

  exclude:
    - "**/*.g.dart"
    - "**/*.freezed.dart"
    - "**/*.mocks.dart"
    - "lib/generated/**"

  errors:
    invalid_annotation_target: ignore
    todo: info

linter:
  rules:
    # ============================================================
    # Stil-Regeln
    # ============================================================

    prefer_single_quotes: true
    require_trailing_commas: true

    # ============================================================
    # Null Safety & Typsicherheit
    # ============================================================

    # Warnt vor unnötigen Null-Checks (z.B. x != null wenn x
    # non-nullable ist). Verhindert toten Code nach Refactoring.
    unnecessary_null_checks: true

    # FIX: unnecessary_type_check entfernt — existiert nicht als Lint-Regel.
    # strict-casts: true (oben im analyzer) übernimmt diese Prüfung.

    # FIX: avoid_as entfernt — wurde in Dart 2.12 aus den Lint-Regeln
    # entfernt (Null Safety macht sie obsolet).
    # strict-casts: true (oben im analyzer) übernimmt die sicherere Prüfung.

    # ============================================================
    # Code-Qualität
    # ============================================================

    unawaited_futures: true
    empty_catches: true
    avoid_void_async: true
    prefer_final_locals: true
    prefer_final_fields: true

    # Verhindert debugPrint/print in Release-Builds
    # Verwende stattdessen AppLogService.logger
    avoid_print: true

    # ============================================================
    # Flutter-spezifisch
    # ============================================================

    use_build_context_synchronously: true
    prefer_const_constructors: true
    prefer_const_literals_to_create_immutables: true
    sized_box_for_whitespace: true

    # ============================================================
    # Dokumentation
    # ============================================================

    package_api_docs: false