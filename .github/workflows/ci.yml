# .github/workflows/ci.yml
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Analyze & Test
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.4'
          channel: stable

      - name: Install dependencies
        working-directory: ./app
        run: flutter pub get

      - name: Analyze
        working-directory: ./app
        run: flutter analyze

      - name: Run tests
        working-directory: ./app
        run: flutter test