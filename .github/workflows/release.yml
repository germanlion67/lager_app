name: Release - Build and Deploy

permissions:
  contents: write
  
on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g., 1.3.4)'
        required: true
        type: string

jobs:
  create-tag:
    name: Create Version Tag
    runs-on: ubuntu-latest
    outputs:
      tag_name: ${{ steps.create_tag.outputs.tag_name }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create and push tag
        id: create_tag
        run: |
          TAG_NAME="v${{ github.event.inputs.version }}"
          echo "tag_name=$TAG_NAME" >> $GITHUB_OUTPUT
          git tag -a "$TAG_NAME" -m "Release version ${{ github.event.inputs.version }}"
          git push https://x-access-token:${{ secrets.GH_PAT }}@github.com/germanlion67/lager_app.git "$TAG_NAME"

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: create-tag
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.create-tag.outputs.tag_name }}

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.4'
          channel: 'stable'

      - name: Get dependencies
        working-directory: ./app
        run: flutter pub get

      - name: Analyze code
        working-directory: ./app
        run: flutter analyze

      - name: Run tests
        working-directory: ./app
        run: flutter test

  build-android:
    name: Build Android
    runs-on: ubuntu-latest
    needs: [create-tag, test]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.create-tag.outputs.tag_name }}

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.4'
          channel: 'stable'

      - name: Get dependencies
        working-directory: ./app
        run: flutter pub get

      - name: Build APK
        working-directory: ./app
        run: flutter build apk --release

      - name: Build App Bundle
        working-directory: ./app
        run: flutter build appbundle --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk-${{ github.event.inputs.version }}
          path: app/build/app/outputs/flutter-apk/app-release.apk

      - name: Upload App Bundle
        uses: actions/upload-artifact@v4
        with:
          name: android-bundle-${{ github.event.inputs.version }}
          path: app/build/app/outputs/bundle/release/app-release.aab

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    needs: [create-tag, test]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.create-tag.outputs.tag_name }}

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.4'
          channel: 'stable'

      - name: Get dependencies
        working-directory: ./app
        run: flutter pub get

      - name: Build Windows
        working-directory: ./app
        run: flutter build windows --release

      - name: Create Windows Archive
        run: |
          Compress-Archive -Path app/build/windows/x64/runner/Release/* -DestinationPath windows-release-${{ github.event.inputs.version }}.zip

      - name: Upload Windows Build
        uses: actions/upload-artifact@v4
        with:
          name: windows-release-${{ github.event.inputs.version }}
          path: windows-release-${{ github.event.inputs.version }}.zip

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [create-tag, test, build-android, build-windows]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.create-tag.outputs.tag_name }}

      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Generate Release Notes
        id: release_notes
        run: |
          VERSION="${{ github.event.inputs.version }}"
          TAG_NAME="${{ needs.create-tag.outputs.tag_name }}"
          
          cat << EOF > release_notes.md
          # 📦 Release $VERSION
          
          ## 📥 Downloads
          
          ### Android
          - **APK (direkte Installation)**: [app-release.apk](https://github.com/germanlion67/lager_app/releases/download/$TAG_NAME/app-release.apk)
          - **App Bundle (Google Play)**: [app-release.aab](https://github.com/germanlion67/lager_app/releases/download/$TAG_NAME/app-release.aab)
          
          ### Windows
          - **Windows Desktop**: [windows-release-$VERSION.zip](https://github.com/germanlion67/lager_app/releases/download/$TAG_NAME/windows-release-$VERSION.zip)
          
          ### Web
          - **Web-App**: Verfügbar über Docker Image \`ghcr.io/germanlion67/lager_app_web:$TAG_NAME\`
          
          ### Weitere Plattformen
          - **iOS/macOS**: Benötigt Apple Developer Account (siehe [MANUELLE_OPTIMIERUNGEN.md](docs/MANUELLE_OPTIMIERUNGEN.md))
          - **Linux**: Kann lokal gebaut werden mit \`flutter build linux --release\`
          
          ## 📋 Änderungen
          
          Siehe [CHANGELOG.md](CHANGELOG.md) für Details.
          
          ## 🚀 Installation
          
          ### Android APK
          1. APK herunterladen
          2. Installation von unbekannten Quellen erlauben
          3. APK öffnen und installieren
          
          ### Windows
          1. ZIP-Datei herunterladen und entpacken
          2. \`lager_app.exe\` ausführen
          
          ### Docker/Web
          Siehe [PRODUCTION_DEPLOYMENT.md](docs/PRODUCTION_DEPLOYMENT.md) für vollständige Anweisungen.
          
          ## 🔧 Systemanforderungen
          
          - **Android**: 5.0+ (API Level 21+)
          - **Windows**: Windows 10/11 (x64)
          - **Web**: Moderne Browser (Chrome, Firefox, Edge, Safari)
          
          ## 📞 Support
          
          Bei Problemen: [GitHub Issues](https://github.com/germanlion67/lager_app/issues)
          EOF

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ needs.create-tag.outputs.tag_name }}
          name: Release ${{ github.event.inputs.version }}
          body_path: release_notes.md
          draft: false
          prerelease: false
          files: |
            android-apk-${{ github.event.inputs.version }}/app-release.apk
            android-bundle-${{ github.event.inputs.version }}/app-release.aab
            windows-release-${{ github.event.inputs.version }}/windows-release-${{ github.event.inputs.version }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
