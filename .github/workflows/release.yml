name: Release - Build and Deploy

permissions:
  contents: write
  
on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g., 1.3.4)'
        required: true
        type: string
      pocketbase_url:
        description: 'Optionaler PocketBase-URL-Default (leer = Setup-Screen beim ersten Start)'
        required: false
        default: ''
        type: string

jobs:
  create-tag:
    name: Create Version Tag
    runs-on: ubuntu-latest
    outputs:
      tag_name: ${{ steps.create_tag.outputs.tag_name }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create and push tag
        id: create_tag
        run: |
          TAG_NAME="v${{ github.event.inputs.version }}"
          echo "tag_name=$TAG_NAME" >> $GITHUB_OUTPUT
          git tag -a "$TAG_NAME" -m "Release version ${{ github.event.inputs.version }}"
          git push https://x-access-token:${{ secrets.GH_PAT }}@github.com/germanlion67/lager_app.git "$TAG_NAME"

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: create-tag
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.create-tag.outputs.tag_name }}
  
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.4'
          channel: 'stable'
  
      - name: Get dependencies
        working-directory: ./app
        run: flutter pub get
  
      - name: Analyze code
        working-directory: ./app
        run: flutter analyze
  
      - name: Run tests
        working-directory: ./app
        run: flutter test --exclude-tags performance

  build-android:
    name: Build Android
    runs-on: ubuntu-latest
    needs: [create-tag, test]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.create-tag.outputs.tag_name }}

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.4'
          channel: 'stable'

      - name: Get dependencies
        working-directory: ./app
        run: flutter pub get

      - name: Prepare build arguments
        id: build-args
        run: |
          ARGS=""
          URL="${{ github.event.inputs.pocketbase_url }}"
          if [ -n "$URL" ]; then
            ARGS="--dart-define=POCKETBASE_URL=$URL"
            echo "Build mit Default-URL: $URL"
          else
            echo "Build ohne Default-URL (Setup-Screen beim ersten Start)"
          fi
          echo "args=$ARGS" >> $GITHUB_OUTPUT

      - name: Decode Android keystore & create key.properties
        working-directory: ./app/android
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > app-release.jks

          cat > key.properties <<'EOF'
          # Der Pfad zum Keystore muss relativ zum build.gradle.kts des App-Moduls sein.
          # Da key.properties in app/android liegt und build.gradle.kts in app/android/app,
          # muss der Pfad im key.properties einen Schritt nach oben gehen.
          storeFile=../app-release.jks
          storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          EOF

      - name: Build APK
        working-directory: ./app
        run: flutter build apk --release ${{ steps.build-args.outputs.args }}

      - name: Build App Bundle
        working-directory: ./app
        run: flutter build appbundle --release ${{ steps.build-args.outputs.args }}

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk-${{ github.event.inputs.version }}
          path: app/build/app/outputs/flutter-apk/app-release.apk

      - name: Upload App Bundle
        uses: actions/upload-artifact@v4
        with:
          name: android-bundle-${{ github.event.inputs.version }}
          path: app/build/app/outputs/bundle/release/app-release.aab

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    needs: [create-tag, test]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.create-tag.outputs.tag_name }}

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.4'
          channel: 'stable'

      - name: Get dependencies
        working-directory: ./app
        run: flutter pub get

      - name: Prepare build arguments
        id: build-args
        shell: pwsh
        run: |
          $url = "${{ github.event.inputs.pocketbase_url }}"
          if ($url) {
            echo "args=--dart-define=POCKETBASE_URL=$url" >> $env:GITHUB_OUTPUT
            Write-Host "Build mit Default-URL: $url"
          } else {
            echo "args=" >> $env:GITHUB_OUTPUT
            Write-Host "Build ohne Default-URL"
          }

      - name: Build Windows
        working-directory: ./app
        run: flutter build windows --release ${{ steps.build-args.outputs.args }}

      - name: Create Windows Archive
        run: |
          Compress-Archive -Path app/build/windows/x64/runner/Release/* -DestinationPath windows-release-${{ github.event.inputs.version }}.zip

      - name: Upload Windows Build
        uses: actions/upload-artifact@v4
        with:
          name: windows-release-${{ github.event.inputs.version }}
          path: windows-release-${{ github.event.inputs.version }}.zip

  build-linux:
      name: Build Linux
      runs-on: ubuntu-latest
      needs: [create-tag, test]
      steps:
        - name: Checkout code
          uses: actions/checkout@v4
          with:
            ref: ${{ needs.create-tag.outputs.tag_name }}

        - name: Setup Flutter
          uses: subosito/flutter-action@v2
          with:
            flutter-version: '3.41.4'
            channel: 'stable'

        - name: Install Linux dependencies
          run: |
            sudo apt-get update
            sudo apt-get install -y \
              clang \
              cmake \
              ninja-build \
              pkg-config \
              libgtk-3-dev \
              libglu1-mesa-dev \
              liblzma-dev \
              libsecret-1-dev

        - name: Get dependencies
          working-directory: ./app
          run: flutter pub get

        - name: Prepare build arguments
          id: build-args
          run: |
            ARGS=""
            URL="${{ github.event.inputs.pocketbase_url }}"
            if [ -n "$URL" ]; then
              ARGS="--dart-define=POCKETBASE_URL=$URL"
              echo "Build mit Default-URL: $URL"
            else
              echo "Build ohne Default-URL"
            fi
            echo "args=$ARGS" >> $GITHUB_OUTPUT

        - name: Build Linux
          working-directory: ./app
          run: flutter build linux --release ${{ steps.build-args.outputs.args }}

        - name: Create Linux Archive
          run: |
            cd app/build/linux/x64/release/bundle
            tar -czf ../../../../../linux-release-${{ github.event.inputs.version }}.tar.gz .
            cd ../../../../../

        - name: Upload Linux Build
          uses: actions/upload-artifact@v4
          with:
            name: linux-release-${{ github.event.inputs.version }}
            path: linux-release-${{ github.event.inputs.version }}.tar.gz

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [create-tag, test, build-android, build-windows, build-linux]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.create-tag.outputs.tag_name }}

      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Generate Release Notes
        id: release_notes
        run: |
          VERSION="${{ github.event.inputs.version }}"
          TAG_NAME="${{ needs.create-tag.outputs.tag_name }}"
          
          # Info ob Default-URL gesetzt wurde
          URL_INFO=""
          if [ -n "${{ github.event.inputs.pocketbase_url }}" ]; then
            URL_INFO="ℹ️ Dieser Build enthält eine vorkonfigurierte Server-URL."
          else
            URL_INFO="ℹ️ Beim ersten Start wird die Server-URL über den Einrichtungs-Screen konfiguriert."
          fi

          cat << EOF > release_notes.md
          # 📦 Release $VERSION
          
          $URL_INFO
          
          ## 📥 Downloads
          
          ### Android
          - **APK (direkte Installation)**: [app-release.apk](https://github.com/germanlion67/lager_app/releases/download/$TAG_NAME/app-release.apk)
          - **App Bundle (Google Play)**: [app-release.aab](https://github.com/germanlion67/lager_app/releases/download/$TAG_NAME/app-release.aab)
          
          ### Windows
          - **Windows Desktop**: [windows-release-$VERSION.zip](https://github.com/germanlion67/lager_app/releases/download/$TAG_NAME/windows-release-$VERSION.zip)

          ### Linux
          - **Linux Desktop**: [linux-release-$VERSION.tar.gz](https://github.com/germanlion67/lager_app/releases/download/$TAG_NAME/linux-release-$VERSION.tar.gz)

          ### Web
          - **Web-App**: Verfügbar über Docker Image \`ghcr.io/germanlion67/lager_app_web:$TAG_NAME\`
          
          ### Weitere Plattformen
          - **iOS/macOS**: Benötigt Apple Developer Account (siehe [MANUELLE_OPTIMIERUNGEN.md](docs/MANUELLE_OPTIMIERUNGEN.md))
          
          ## 📋 Änderungen
          
          Siehe [CHANGELOG.md](CHANGELOG.md) für Details.
          
          ## 🚀 Installation
          
          ### Android APK
          1. APK herunterladen
          2. Installation von unbekannten Quellen erlauben
          3. APK öffnen und installieren
          4. Beim ersten Start: Server-URL eingeben
          
          ### Windows
          1. ZIP-Datei herunterladen und entpacken
          2. \`lager_app.exe\` ausführen
          3. Beim ersten Start: Server-URL eingeben

          ### Linux
          1. tar.gz-Datei herunterladen
          2. Entpacken: \`tar -xzf linux-release-$VERSION.tar.gz\`
          3. Ausführbar machen: \`chmod +x lager_app\`
          4. Starten: \`./lager_app\`
          5. Beim ersten Start: Server-URL eingeben

          ### Docker/Web
          Siehe [PRODUCTION_DEPLOYMENT.md](docs/PRODUCTION_DEPLOYMENT.md) für vollständige Anweisungen.
          
          ## 🔧 Systemanforderungen
          
          - **Android**: 5.0+ (API Level 21+)
          - **Windows**: Windows 10/11 (x64)
          - **Linux**: Ubuntu 20.04+, Debian 11+, Fedora 35+ (oder ähnlich, GTK3 erforderlich)
          - **Web**: Moderne Browser (Chrome, Firefox, Edge, Safari)
          
          ## 📞 Support
          
          Bei Problemen: [GitHub Issues](https://github.com/germanlion67/lager_app/issues)
          EOF

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ needs.create-tag.outputs.tag_name }}
          name: Release ${{ github.event.inputs.version }}
          body_path: release_notes.md
          draft: false
          prerelease: false
          files: |
            android-apk-${{ github.event.inputs.version }}/app-release.apk
            android-bundle-${{ github.event.inputs.version }}/app-release.aab
            windows-release-${{ github.event.inputs.version }}/windows-release-${{ github.event.inputs.version }}.zip
            linux-release-${{ github.event.inputs.version }}/linux-release-${{ github.event.inputs.version }}.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
