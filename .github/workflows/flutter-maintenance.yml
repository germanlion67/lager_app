name: Flutter Maintenance

on:
  workflow_dispatch:
  schedule:
    - cron: '0 4 * * 1'

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.4'
          channel: stable

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang \
            cmake \
            ninja-build \
            pkg-config \
            libgtk-3-dev \
            libglu1-mesa-dev \
            liblzma-dev \
            libsecret-1-dev

      - name: Flutter doctor
        run: flutter doctor -v

      - name: Fetch dependencies
        working-directory: ./app
        run: flutter pub get

      - name: Capture outdated reports
        working-directory: ./app
        run: |
          mkdir -p build/reports
          flutter pub outdated --no-dev-dependencies --no-transitive > build/reports/outdated-direct.txt || true
          flutter pub outdated > build/reports/outdated-full.txt || true

      - name: Analyze project
        working-directory: ./app
        run: flutter analyze

      - name: Run tests
        working-directory: ./app
        run: flutter test --no-pub --exclude-tags performance

      - name: Build debug APK
        working-directory: ./app
        run: flutter build apk --debug

      - name: Build Linux
        working-directory: ./app
        run: flutter build linux --debug

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: flutter-maintenance-reports
          path: app/build/reports

  windows-build:
    runs-on: windows-latest
    timeout-minutes: 120
    needs: verify

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.4'
          channel: stable

      - name: Pre-cache Windows artifacts
        run: flutter precache --windows

      - name: Fetch dependencies
        working-directory: ./app
        run: flutter pub get

      - name: Build Windows app
        working-directory: ./app
        run: flutter build windows --debug

      - name: Upload Windows build
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: flutter-windows-build
          path: app/build/windows/x64/runner/Release