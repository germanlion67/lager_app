name: Deploy to Production

on:
  push:
    branches:
      - main  # Oder dein Haupt-Branch

jobs:
  deploy:
    name: Deploy Docker Compose to VPS
    runs-on: ubuntu-latest
    
    steps:
      # ============================================================
      # 1. Code auschecken
      # ============================================================
      - name: Checkout code
        uses: actions/checkout@v4

      # ============================================================
      # 2. SSH-Setup
      # ============================================================
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      # ============================================================
      # 3. Code auf VPS kopieren
      # ============================================================
      - name: Copy files to VPS
        run: |
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='node_modules' \
            --exclude='.env*' \
            ./ ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:~/lager_app/

      # ============================================================
      # 4. Docker Compose auf VPS ausführen
      # ============================================================
      - name: Deploy with Docker Compose
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} << 'EOF'
            cd ~/lager_app
            
            # Docker Compose stoppen (falls läuft)
            docker compose -f docker-compose.prod.yml down || true
            
            # Neue Container starten
            docker compose -f docker-compose.prod.yml --env-file .env.production up -d
            
            # Status anzeigen
            docker compose -f docker-compose.prod.yml ps
            
            # Logs der letzten 50 Zeilen
            docker compose -f docker-compose.prod.yml logs --tail=50
          EOF

      # ============================================================
      # 5. Deployment-Status
      # ============================================================
      - name: Deployment Summary
        run: |
          echo "✅ Deployment abgeschlossen!"
          echo "🌐 App URL: https://germanlion67.de"
          echo "🔧 Portainer: http://212.227.102.199:9000"