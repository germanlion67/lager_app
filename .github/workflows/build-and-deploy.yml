name: Build Images & Deploy to Production

on:
  push:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}

jobs:
  # ============================================================
  # Job 1: Build & Push Docker Images
  # ============================================================
  build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta-pocketbase
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/lager_app_pocketbase
          tags: |
            type=raw,value=latest
            type=sha,prefix={{branch}}-

      - name: Build and push PocketBase image
        uses: docker/build-push-action@v5
        with:
          context: ./server
          file: ./server/Dockerfile
          push: true
          tags: ${{ steps.meta-pocketbase.outputs.tags }}
          labels: ${{ steps.meta-pocketbase.outputs.labels }}

      - name: Extract metadata for Frontend
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/lager_app_web
          tags: |
            type=raw,value=latest
            type=sha,prefix={{branch}}-

      - name: Build and push Frontend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./app/Dockerfile
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}

  # ============================================================
  # Job 2: Deploy to VPS
  # ============================================================
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: build  # Wartet bis Images gebaut sind
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Copy docker-compose.prod.yml to VPS
        run: |
          scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            docker-compose.prod.yml \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:~/lager_app/

      - name: Deploy with Docker Compose
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} << 'EOF'
            cd ~/lager_app
            
            # Login zu GHCR
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            
            # Neue Images pullen
            docker compose -f docker-compose.prod.yml pull
            
            # Container neu starten
            docker compose -f docker-compose.prod.yml --env-file .env.production up -d
            
            # Alte Images aufräumen
            docker image prune -f
            
            # Status anzeigen
            docker compose -f docker-compose.prod.yml ps
          EOF

      - name: Deployment Summary
        run: |
          echo "✅ Images gebaut und deployed!"
          echo "📦 PocketBase: ghcr.io/${{ env.IMAGE_PREFIX }}/lager_app_pocketbase:latest"
          echo "📦 Frontend: ghcr.io/${{ env.IMAGE_PREFIX }}/lager_app_web:latest"