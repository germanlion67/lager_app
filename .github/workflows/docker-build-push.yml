name: Build and Push Docker Images

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME_WEB: ${{ github.repository }}_web
  IMAGE_NAME_POCKETBASE: ${{ github.repository }}_pocketbase

jobs:
  build-and-push-web:
    name: Build & Push Flutter Web
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_WEB }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Flutter Web image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./app/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            POCKETBASE_URL=https://your-production-server.com

  build-and-push-pocketbase:
    name: Build & Push PocketBase
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_POCKETBASE }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push PocketBase image
        uses: docker/build-push-action@v5
        with:
          context: ./server
          file: ./server/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  test-deployment:
    name: Test Docker Compose
    runs-on: ubuntu-latest
    needs: [build-and-push-web, build-and-push-pocketbase]
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create test environment file
        run: |
          cat > .env.test << EOF
          POCKETBASE_URL=http://localhost:8080
          PB_ADMIN_EMAIL=test@example.com
          PB_ADMIN_PASSWORD=testpassword123
          PB_PORT=8080
          WEB_PORT=8081
          EOF

      - name: Start services with Docker Compose
        run: |
          docker compose -f docker-compose.yml --env-file .env.test up -d --build

      # NEW: wait for actual HTTP endpoints instead of Docker "healthy" status
      - name: Wait for PocketBase health endpoint
        run: |
          timeout 180 sh -c 'until curl -fsS http://localhost:8080/api/health; do sleep 2; done'
         
      - name: Check PocketBase health
        run: |
          curl -f http://localhost:8080/api/health || exit 1
          
      - name: Check Flutter Web
        run: |
          curl -f http://localhost:8081/ || exit 1

      - name: Show logs on failure
        if: failure()
        run: |
          docker compose logs
          
      - name: Cleanup
        if: always()
        run: |
          docker compose down -v
