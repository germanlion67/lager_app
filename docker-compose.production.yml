# docker-compose.production.yml
#
# Production-Setup für Docker Swarm:
#   - Traefik als Reverse Proxy mit SSL
#   - PocketBase Backend
#   - Flutter Web Frontend
#   - Automatische HTTPS-Zertifikate (Let's Encrypt)
#   - Load Balancing & High Availability

version: '3.8'

services:

  # ============================================================
  # Traefik Reverse Proxy with SSL
  # ============================================================
  traefik:
    image: traefik:v3.3
    command:
      # API & Dashboard
      - "--api.insecure=true"
      - "--api.dashboard=true"
      
      # Docker Provider
      - "--providers.docker=true"
      - "--providers.docker.swarmMode=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=lager_network"
      
      # Entrypoints
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      
      # HTTP -> HTTPS Redirect
      - "--entrypoints.web.http.redirections.entryPoint.to=websecure"
      - "--entrypoints.web.http.redirections.entryPoint.scheme=https"
      - "--entrypoints.web.http.redirections.entryPoint.permanent=true"
      
      # Let's Encrypt
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web"
      - "--certificatesresolvers.letsencrypt.acme.email=your-email@example.com"  # ← ÄNDERN!
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
      
      # Logging
      - "--log.level=INFO"
      - "--accesslog=true"
    
    ports:
      - target: 80
        published: 80
        mode: host
      - target: 443
        published: 443
        mode: host
      - target: 8080
        published: 8080
        mode: host
    
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik-certificates:/letsencrypt
    
    networks:
      - lager_network
    
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
      labels:
        - "traefik.enable=true"
        # Dashboard
        - "traefik.http.routers.traefik.rule=Host(`traefik.lager.germanlion67.de`)"
        - "traefik.http.routers.traefik.service=api@internal"
        - "traefik.http.routers.traefik.entrypoints=websecure"
        - "traefik.http.routers.traefik.tls.certresolver=letsencrypt"

  # ============================================================
  # PocketBase Backend
  # ============================================================
  pocketbase:
    image: germanlion67/lager_app_pocketbase:latest
    command:
      - sh
      - -c
      - '/pb/pocketbase serve --http=0.0.0.0:8080 --dir=/pb_data & PB_PID=$$! && sleep 3 && /pb/init-pocketbase.sh && wait $$PB_PID'
    
    environment:
      # Admin-Zugangsdaten
      - PB_ADMIN_EMAIL=${PB_ADMIN_EMAIL:-admin@example.com}
      - PB_ADMIN_PASSWORD=${PB_ADMIN_PASSWORD}
      - PB_DATA_DIR=/pb_data
      - PB_MIGRATIONS_DIR=/pb_migrations
      - PB_FORCE_SUPERUSER_UPSERT=0
      - PB_DEV_MODE=0  # Production!
      
      # CORS: Nur die eigene Domain erlauben
      - CORS_ALLOWED_ORIGINS=https://lager.germanlion67.de
    
    volumes:
      - pocketbase_data:/pb_data
      - pocketbase_public:/pb_public
    
    networks:
      - lager_network
    
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    
    deploy:
      mode: replicated
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
      labels:
        - "traefik.enable=true"
        
        # API Routes
        - "traefik.http.routers.pocketbase-api.rule=Host(`lager.germanlion67.de`) && PathPrefix(`/api`)"
        - "traefik.http.routers.pocketbase-api.entrypoints=websecure"
        - "traefik.http.routers.pocketbase-api.tls.certresolver=letsencrypt"
        - "traefik.http.routers.pocketbase-api.priority=100"
        
        # Admin UI
        - "traefik.http.routers.pocketbase-admin.rule=Host(`lager.germanlion67.de`) && PathPrefix(`/_`)"
        - "traefik.http.routers.pocketbase-admin.entrypoints=websecure"
        - "traefik.http.routers.pocketbase-admin.tls.certresolver=letsencrypt"
        - "traefik.http.routers.pocketbase-admin.priority=100"
        
        # Service
        - "traefik.http.services.pocketbase.loadbalancer.server.port=8080"

  # ============================================================
  # Flutter Web Frontend
  # ============================================================
  app:
    image: germanlion67/lager_app_frontend:latest
    
    environment:
      # Production URL
      - POCKETBASE_URL=https://lager.germanlion67.de
    
    networks:
      - lager_network
    
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8081/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    
    deploy:
      mode: replicated
      replicas: 2  # Load Balancing!
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
      rollback_config:
        parallelism: 1
        delay: 5s
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
      labels:
        - "traefik.enable=true"
        
        # Frontend Routes (niedrigere Priority als API)
        - "traefik.http.routers.frontend.rule=Host(`lager.germanlion67.de`)"
        - "traefik.http.routers.frontend.entrypoints=websecure"
        - "traefik.http.routers.frontend.tls.certresolver=letsencrypt"
        - "traefik.http.routers.frontend.priority=50"
        
        # Service
        - "traefik.http.services.frontend.loadbalancer.server.port=8081"

# ============================================================
# Volumes
# ============================================================
volumes:
  pocketbase_data:
    driver: local
  pocketbase_public:
    driver: local
  traefik-certificates:
    driver: local

# ============================================================
# Networks
# ============================================================
networks:
  lager_network:
    driver: overlay
    attachable: true