services:
  # PocketBase Backend (DB, Auth, File-Storage)
  server:
    image: ghcr.io/muchobien/pocketbase:latest
    container_name: lager_backend
    restart: unless-stopped
    ports:
      - "8090:8090"
    volumes:
      - ./server/pb_data:/pb_data
      - ./server/pb_public:/pb_public
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/api/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  # Flutter Web Frontend
  app:
    build:
      context: ./app
      dockerfile: Dockerfile
    container_name: lager_frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      server:
        condition: service_healthy
