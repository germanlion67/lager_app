# docker-compose.yml
#
# Dev/Test-Setup:
#   - Flutter Web (Caddy) auf Port 8081
#   - PocketBase direkt auf Port 8080
#   - Kein interner Reverse Proxy (nginx entfernt)
#
# RUNTIME-KONFIGURATION:
#   Die POCKETBASE_URL wird jetzt zur Laufzeit aus Umgebungsvariablen gelesen.
#   Es ist KEIN Rebuild mehr nötig bei URL-Änderungen!
#   → Setze einfach POCKETBASE_URL in .env oder als Umgebungsvariable
#   → docker compose restart app genügt
#
# WICHTIG: POCKETBASE_URL muss eine vom Browser erreichbare Adresse sein.
#   Der Flutter Web Build läuft im Browser des Nutzers — nicht im Container!
#   → localhost funktioniert nur weil Port 8080 nach außen gemappt ist.
#   → In Produktion: echte Domain angeben (kein localhost).

services:

  # ============================================================
  # PocketBase Backend with Auto-Initialization
  # 
  # Features:
  # - Automatische Admin-User-Erstellung beim ersten Start
  # - Automatische Migration-Anwendung
  # - Konfiguration über Umgebungsvariablen
  # ============================================================
  pocketbase:
    build:
      context: ./server
      dockerfile: Dockerfile
    command:
      - sh
      - -c
      - '/pb/pocketbase serve --http=0.0.0.0:8080 --dir=/pb_data & PB_PID=$$! && sleep 3 && /pb/init-pocketbase.sh && wait $$PB_PID'
    container_name: pocketbase
    restart: unless-stopped
    ports:
      # Direkt erreichbar — kein Reverse Proxy vorgeschaltet.
      # Admin UI: http://localhost:8080/_/
      # API:      http://localhost:8080/api/
      - "${PB_PORT:-8080}:8080"
    environment:
      # Admin-Zugangsdaten für Dev/Test
      - PB_ADMIN_EMAIL=${PB_ADMIN_EMAIL:-admin@example.com}
      - PB_ADMIN_PASSWORD=${PB_ADMIN_PASSWORD:-changeme123}
      - PB_DATA_DIR=/pb_data
      - PB_MIGRATIONS_DIR=/pb_migrations
      - PB_FORCE_SUPERUSER_UPSERT=${PB_FORCE_SUPERUSER_UPSERT:-0}
      - PB_DEV_MODE=${PB_DEV_MODE:-1}
      # CORS-Konfiguration: Erlaubte Origins (komma-getrennt)
      # Dev/Test: * erlaubt alle Origins (praktisch für Entwicklung)
      # Produktion: Spezifische Domains angeben (siehe .env.production.example)
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-*}
    volumes:
      - ./server/pb_data:/pb_data
      - ./server/pb_public:/pb_public
      - ./server/pb_migrations:/pb_migrations
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/api/health"]
      interval: 10s
      timeout: 5s
      retries: 30          # ← erhöht: PocketBase braucht beim ersten Start länger
      start_period: 60s   # ← erhöht: gibt PocketBase Zeit zum initialisieren
    networks:
      - lager_network

  # ============================================================
  # Flutter Web Frontend (Caddy) with Runtime Configuration
  # 
  # Features:
  # - Runtime-Konfiguration: POCKETBASE_URL wird beim Start generiert
  # - Kein Rebuild bei URL-Änderungen nötig
  # - Einfach POCKETBASE_URL ändern und Container neustarten
  # ============================================================
  app:
    build:
      context: .
      dockerfile: app/Dockerfile
      # Build-Zeit-URL nur als Fallback wenn Runtime-Config fehlt
      args:
        - POCKETBASE_URL=${POCKETBASE_URL:-http://localhost:${PB_PORT:-8080}}
    container_name: lager_frontend
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-8081}:8081"
    environment:
      # Runtime-Konfiguration: Wird beim Container-Start in config.js geschrieben
      - POCKETBASE_URL=${POCKETBASE_URL:-http://localhost:${PB_PORT:-8080}}
    depends_on:
      pocketbase:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8081/"]
      interval: 30s
      timeout: 3s
      start_period: 5s
      retries: 3
    networks:
      - lager_network

networks:
  lager_network:
    driver: bridge
