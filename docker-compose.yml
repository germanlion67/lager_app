# docker-compose.yml

services:
  # ============================================================
  # PocketBase Backend
  # ============================================================
  pocketbase:
    image: ghcr.io/muchobien/pocketbase:latest
    command:
      - serve
      - --http=0.0.0.0:8080
      - --dir=/pb_data
    container_name: lager_backend
    restart: unless-stopped
    # KEIN externer Port mehr nötig! nginx leitet intern weiter.
    # Für direkten Admin-Zugriff optional freigeben:
    # ports:
    #   - "${PB_PORT:-8080}:8080"
    volumes:
      - ./server/pb_data:/pb_data
      - ./server/pb_public:/pb_public
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/api/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - lager_network

  # ============================================================
  # Flutter Web Frontend + Reverse Proxy
  # ============================================================
  app:
    build:
      context: ./app
      dockerfile: Dockerfile
      args:
        # Relativer Pfad! nginx leitet /api/* an PocketBase weiter
        - PB_URL=/api
    container_name: lager_frontend
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-8081}:80"
    depends_on:
      pocketbase:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:80/"]
      interval: 30s
      timeout: 3s
      retries: 3
    networks:
      - lager_network

networks:
  lager_network:
    driver: bridge
