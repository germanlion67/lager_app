services:
  # PocketBase Backend
  server:
    image: ghcr.io/muchobien/pocketbase:latest
    command:
      - serve
      - --http=0.0.0.0:8080   # gesetzt in .env
      - --dir=/pb_data
    container_name: lager_backend
    restart: unless-stopped
    ports:
      - "${PB_PORT}:8080"           # gesetzt in .env
    volumes:
      - ./server/pb_data:/pb_data
      - ./server/pb_public:/pb_public
    healthcheck:
      # Nutzt den internen Port für den Check
      # test: ["CMD", "wget", "--spider", "-q", "http://localhost:${PB_PORT}/api/health"]
      test: ["CMD-SHELL", "/usr/local/bin/pocketbase health --addr=localhost:8080 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - lager_network

  # Flutter Web Frontend  
  app:
    build:
      context: ./app
      dockerfile: Dockerfile
      args:
        # Hier wird die IP aus der .env in den Flutter-Build "eingebrannt"
        - PB_URL=http://${MY_SERVER_IP}:${PB_PORT}
    container_name: lager_frontend
    restart: unless-stopped
    ports:
      - "${WEB_PORT}:80"             # Geändert auf 8081, damit Port 8080 nicht kollidiert
    depends_on:
      server:
        condition: service_healthy
    networks:
      - lager_network

networks:
  lager_network:
    driver: bridge
